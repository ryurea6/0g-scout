<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0014;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12002a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" />
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    
    <!-- Ambient glow -->
    <circle cx="256" cy="256" r="200" fill="#8b5cf6" opacity="0.05" filter="url(#softGlow)"/>
    <circle cx="200" cy="220" r="120" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>
    
    <!-- Scanner rings -->
    <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="1.5"/>
    <circle cx="256" cy="256" r="115" fill="none" stroke="url(#ring)" stroke-width="1.5"/>
    <circle cx="256" cy="256" r="80" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
    <circle cx="256" cy="256" r="45" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
    
    <!-- Sweep arc -->
    <path d="M 256 256 L 256 106 A 150 150 0 0 1 386 190 Z" fill="url(#accent)" opacity="0.06"/>
    <line x1="256" y1="256" x2="256" y2="106" stroke="url(#accent)" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
    
    <!-- Network nodes -->
    <g filter="url(#glow)">
      <circle cx="256" cy="106" r="8" fill="#8b5cf6"/>
      <circle cx="386" cy="190" r="6" fill="#06b6d4" opacity="0.8"/>
      <circle cx="126" cy="190" r="6" fill="#a78bfa" opacity="0.8"/>
      <circle cx="360" cy="330" r="5" fill="#22d3ee" opacity="0.6"/>
      <circle cx="152" cy="330" r="5" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="256" cy="406" r="5" fill="#a78bfa" opacity="0.5"/>
    </g>
    
    <!-- Connection lines -->
    <line x1="256" y1="106" x2="256" y2="210" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3"/>
    <line x1="386" y1="190" x2="296" y2="256" stroke="#06b6d4" stroke-width="1.5" opacity="0.2"/>
    <line x1="126" y1="190" x2="216" y2="256" stroke="#a78bfa" stroke-width="1.5" opacity="0.2"/>
    <line x1="360" y1="330" x2="290" y2="280" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
    <line x1="152" y1="330" x2="222" y2="280" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
    <line x1="256" y1="406" x2="256" y2="302" stroke="#a78bfa" stroke-width="1" opacity="0.12"/>
    
    <!-- Center diamond -->
    <g filter="url(#glow)">
      <polygon points="256,210 308,256 256,302 204,256" fill="url(#accent)" opacity="0.9"/>
      <polygon points="256,222 296,256 256,290 216,256" fill="#0c0014"/>
      <polygon points="256,234 284,256 256,278 228,256" fill="url(#accent)" opacity="0.6"/>
    </g>
    
    <!-- Corner accent dots -->
    <circle cx="80" cy="80" r="3" fill="#8b5cf6" opacity="0.2"/>
    <circle cx="432" cy="80" r="3" fill="#06b6d4" opacity="0.2"/>
    <circle cx="80" cy="432" r="2" fill="#a78bfa" opacity="0.15"/>
    <circle cx="432" cy="432" r="2" fill="#22d3ee" opacity="0.15"/>
  </g>
</svg>
