<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C084FC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6D28D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cheekL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DDD6FE;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#C4B5FD;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="cheekR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0ABFC;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#E9D5FF;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D946EF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#round)">
    <!-- Light off-white background -->
    <rect width="512" height="512" fill="#F5F0FF"/>
    
    <!-- Left ear -->
    <ellipse cx="165" cy="110" rx="58" ry="55" fill="url(#ear)"/>
    <!-- Right ear -->
    <ellipse cx="347" cy="110" rx="58" ry="55" fill="url(#ear)"/>
    
    <!-- Face circle -->
    <circle cx="256" cy="265" r="155" fill="url(#face)"/>
    
    <!-- Left cheek -->
    <ellipse cx="185" cy="310" rx="40" ry="25" fill="url(#cheekL)" opacity="0.7"/>
    <!-- Right cheek -->
    <ellipse cx="327" cy="310" rx="40" ry="25" fill="url(#cheekR)" opacity="0.7"/>
    
    <!-- LEFT EYE — Ø (circle with diagonal slash) -->
    <g>
      <circle cx="195" cy="245" r="42" fill="url(#eyeGrad)"/>
      <!-- Inner cutout -->
      <circle cx="195" cy="245" r="28" fill="#F5F0FF"/>
      <!-- Diagonal slash (white) from bottom-left to top-right -->
      <line x1="161" y1="279" x2="229" y2="211" stroke="#F5F0FF" stroke-width="14" stroke-linecap="round"/>
    </g>
    
    <!-- RIGHT EYE — G (circle with horizontal bar) -->
    <g>
      <circle cx="317" cy="245" r="42" fill="url(#eyeGrad)"/>
      <!-- Inner cutout -->
      <circle cx="317" cy="245" r="28" fill="#F5F0FF"/>
      <!-- Gap on right side + horizontal bar -->
      <rect x="317" y="237" width="42" height="16" fill="#F5F0FF" rx="2"/>
      <!-- Small bar extending inward from right -->
      <rect x="305" y="237" width="20" height="16" fill="#F5F0FF" rx="2"/>
    </g>
    
    <!-- NOSE — double arrow down -->
    <g transform="translate(256, 305)">
      <!-- Top arrow -->
      <polygon points="0,-18 -12,-4 12,-4" fill="none" stroke="#F5F0FF" stroke-width="3" stroke-linejoin="round"/>
      <!-- Bottom arrow -->
      <polygon points="0,0 -12,14 12,14" fill="none" stroke="#F5F0FF" stroke-width="3" stroke-linejoin="round"/>
    </g>
    
    <!-- SCOUT text — curved along bottom of face -->
    <path id="textPath" d="M 140 370 A 130 130 0 0 0 372 370" fill="none"/>
    <text font-family="'Plus Jakarta Sans', 'Inter', 'SF Pro Display', system-ui, sans-serif" 
          font-size="32" font-weight="700" letter-spacing="6" fill="#F5F0FF">
      <textPath href="#textPath" startOffset="50%" text-anchor="middle">SCOUT</textPath>
    </text>
  </g>
</svg>
